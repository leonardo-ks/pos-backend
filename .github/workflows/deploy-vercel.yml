name: Deploy Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Vercel deployment target.
        type: choice
        required: true
        default: preview
        options:
          - preview
          - production
      run_migrations:
        description: Run database migrations after a successful deployment.
        type: boolean
        required: true
        default: false
      seed_auth:
        description: Seed demo auth users after a successful deployment.
        type: boolean
        required: true
        default: false
      seed_demo:
        description: Seed demo business data after a successful deployment.
        type: boolean
        required: true
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'preview' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Pull Vercel environment
        run: npx vercel@latest pull --yes --environment=${{ env.DEPLOY_TARGET }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build preview
        if: env.DEPLOY_TARGET != 'production'
        run: npx vercel@latest build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production
        if: env.DEPLOY_TARGET == 'production'
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy preview
        if: env.DEPLOY_TARGET != 'production'
        run: npx vercel@latest deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production
        if: env.DEPLOY_TARGET == 'production'
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Run database migrations
        if: github.event_name == 'workflow_dispatch' && inputs.run_migrations
        run: npm run db:migrate

      - name: Seed auth users
        if: github.event_name == 'workflow_dispatch' && inputs.seed_auth
        run: npm run seed:auth

      - name: Seed demo data
        if: github.event_name == 'workflow_dispatch' && inputs.seed_demo
        run: npm run seed:demo
